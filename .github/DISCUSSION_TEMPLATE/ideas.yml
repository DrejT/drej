title: "[Idea]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for drej? Describe it below and let's brainstorm — this is the place
        for early-stage ideas, before they're concrete enough to become an issue.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's currently difficult or impossible?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed API or behaviour
      description: What would the ideal solution look like? Code examples are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
