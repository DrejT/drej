name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Typecheck opensandbox
        run: bunx tsc --noEmit --strict
        working-directory: packages/opensandbox

      - name: Typecheck core
        run: bunx tsc --noEmit --strict
        working-directory: packages/core

      - name: Typecheck SDK
        run: bunx tsc --noEmit --strict
        working-directory: packages/sdks/typescript

      - name: Typecheck workflow
        run: bunx tsc --noEmit --strict
        working-directory: packages/workflow

      - name: Typecheck postgres adapter
        run: bunx tsc --noEmit --strict
        working-directory: packages/adapters/postgres

      - name: Typecheck sqlite adapter
        run: bunx tsc --noEmit --strict
        working-directory: packages/adapters/sqlite

      - name: Typecheck otel adapter
        run: bunx tsc --noEmit --strict
        working-directory: packages/adapters/otel

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

      - name: Run tests
        run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Build all packages
        run: bun run build

  changeset:
    name: Changeset check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install

      - name: Check for changeset
        run: bunx changeset status --since origin/main
